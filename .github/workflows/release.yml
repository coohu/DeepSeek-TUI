name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package/release version to publish to npm, without the leading v'
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  parity:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update && break
            echo "apt-get update failed (attempt $i); retrying in 15s"
            sleep 15
          done
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Compile check
        run: cargo check --workspace --all-targets --locked
      - name: OHOS dependency graph
        run: ./scripts/release/check-ohos-deps.sh
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Workspace tests
        run: cargo test --workspace --all-features --locked
      - name: TUI snapshot parity
        run: cargo test -p deepseek-tui-core --test snapshot --locked
      - name: Protocol schema parity
        run: cargo test -p deepseek-protocol --test parity_protocol --locked
      - name: State persistence parity
        run: cargo test -p deepseek-state --test parity_state --locked
      - name: Lockfile drift guard
        run: git diff --exit-code -- Cargo.lock

  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      source_ref: ${{ steps.release.outputs.source_ref }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release source
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="v${{ inputs.version }}"
            if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
              sha="$(git rev-list -n 1 "${tag}")"
              source_ref="${tag}"
            else
              # Tag doesn't exist yet — build from HEAD
              sha="${GITHUB_SHA}"
              source_ref="${GITHUB_SHA}"
              echo "Tag ${tag} not found; building from ${source_ref} @ ${sha}"
            fi
          else
            tag="${GITHUB_REF_NAME}"
            sha="${GITHUB_SHA}"
            source_ref="${GITHUB_REF_NAME}"
          fi

          if [ -z "${sha}" ]; then
            echo "Unable to resolve release source for ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  build:
    needs: [parity, resolve]
    # `parity` is gated to tag-push events. On manual `workflow_dispatch`,
    # parity is skipped, so let `build` proceed when parity either succeeded
    # or was skipped — but never when it actually failed or the run was
    # cancelled. Operators using dispatch are expected to have already run
    # the same gates locally / via ci.yml on `main`.
    if: ${{ !cancelled() && (needs.parity.result == 'success' || needs.parity.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- deepseek (cli dispatcher, canonical) ---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: deepseek
            artifact_name: deepseek-linux-arm64
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            binary: deepseek
            artifact_name: deepseek-linux-riscv64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: deepseek
            artifact_name: deepseek-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: deepseek
            artifact_name: deepseek-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: deepseek.exe
            artifact_name: deepseek-windows-x64.exe
          # --- deepseek-tui (TUI runtime, canonical) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: deepseek-tui
            artifact_name: deepseek-tui-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: deepseek-tui
            artifact_name: deepseek-tui-linux-arm64
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            binary: deepseek-tui
            artifact_name: deepseek-tui-linux-riscv64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: deepseek-tui
            artifact_name: deepseek-tui-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: deepseek-tui
            artifact_name: deepseek-tui-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: deepseek-tui.exe
            artifact_name: deepseek-tui-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update && break
            echo "apt-get update failed (attempt $i); retrying in 15s"
            sleep 15
          done
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install RISC-V cross-compilation toolchain
        if: matrix.target == 'riscv64gc-unknown-linux-gnu'
        run: |
          # Install cross-compiler (available in standard repos)
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross

          # Add Ubuntu ports for riscv64 packages
          . /etc/os-release
          sudo tee /etc/apt/sources.list.d/riscv64.sources <<SRC
          Types: deb
          URIs: http://ports.ubuntu.com/
          Suites: ${UBUNTU_CODENAME} ${UBUNTU_CODENAME}-updates
          Components: main universe
          Architectures: riscv64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SRC
          sudo dpkg --add-architecture riscv64
          sudo apt-get update -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/riscv64.sources -o Dir::Etc::sourceparts=- -o APT::Get::List-Cleanup=0
          sudo apt-get install -y libdbus-1-dev:riscv64
      - name: Install AArch64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux'
        run: |
          . /etc/os-release
          sudo tee /etc/apt/sources.list.d/arm64.sources <<SRC
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: ${UBUNTU_CODENAME} ${UBUNTU_CODENAME}-updates ${UBUNTU_CODENAME}-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SRC
          sudo dpkg --add-architecture arm64
          sudo apt-get update -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/arm64.sources -o Dir::Etc::sourceparts=- -o APT::Get::List-Cleanup=0
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libdbus-1-dev:arm64 pkg-config
      - name: Build
        shell: bash
        env:
          DEEPSEEK_BUILD_SHA: ${{ needs.resolve.outputs.sha }}
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_LIBDIR_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR_riscv64gc_unknown_linux_gnu: /usr/lib/riscv64-linux-gnu/pkgconfig
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [ ! -f "${BIN_PATH}" ]; then
            echo "Binary not at ${BIN_PATH}; searching target/ for ${{ matrix.binary }}:"
            find target -name "${{ matrix.binary }}" -type f
            exit 1
          fi
          cp "${BIN_PATH}" "${{ matrix.artifact_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  bundle:
    needs: [build, resolve]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'deepseek*'
      - name: Create platform archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundles/checksums
          MANIFEST="bundles/checksums/deepseek-bundles-sha256.txt"
          : > "$MANIFEST"

          bundle() {
            local platform="$1"   # linux-x64, linux-arm64, macos-x64, macos-arm64, windows-x64
            local cli_src="$2"    # artifact name for deepseek binary
            local tui_src="$3"    # artifact name for deepseek-tui binary
            local ext="$4"        # tar.gz or zip
            local variant="$5"    # '' (standard) or 'portable' (Windows only, no install script)
            shift 5

            local dir="bundles/deepseek-${platform}${variant:+-}${variant}"
            mkdir -p "$dir"

            # Copy binaries, stripping platform suffixes
            local cli_dst="deepseek"
            local tui_dst="deepseek-tui"
            if [[ "$platform" == windows-* ]]; then
              cli_dst="deepseek.exe"
              tui_dst="deepseek-tui.exe"
            fi
            cp "artifacts/${cli_src}/${cli_src}" "$dir/${cli_dst}"
            cp "artifacts/${tui_src}/${tui_src}" "$dir/${tui_dst}"

            # Add install script (standard variant only)
            if [[ "$variant" != "portable" ]]; then
              if [[ "$platform" == windows-* ]]; then
                cp scripts/release/install.bat "$dir/"
                # Convert line endings to CRLF for Windows
                sed -i 's/$/\r/' "$dir/install.bat" 2>/dev/null || true
              else
                cp scripts/release/install.sh "$dir/"
                chmod +x "$dir/install.sh"
              fi
            fi

            if [[ "$ext" == "zip" ]]; then
              (cd bundles && zip -r "deepseek-${platform}${variant:+-}${variant}.zip" "deepseek-${platform}${variant:+-}${variant}/")
            else
              tar -czf "bundles/deepseek-${platform}${variant:+-}${variant}.tar.gz" -C bundles "deepseek-${platform}${variant:+-}${variant}/"
            fi

            local archive="deepseek-${platform}${variant:+-}${variant}.${ext}"
            sha256sum "bundles/${archive}" | awk '{printf "%s  %s\n", $1, $2}' >> "$MANIFEST"
            echo "  Created bundles/${archive}"
          }

          # Platform: linux-x64
          bundle linux-x64 \
            deepseek-linux-x64 deepseek-tui-linux-x64 tar.gz ""

          # Platform: linux-arm64
          bundle linux-arm64 \
            deepseek-linux-arm64 deepseek-tui-linux-arm64 tar.gz ""

          # Platform: linux-riscv64
          bundle linux-riscv64 \
            deepseek-linux-riscv64 deepseek-tui-linux-riscv64 tar.gz ""

          # Platform: macos-x64
          bundle macos-x64 \
            deepseek-macos-x64 deepseek-tui-macos-x64 tar.gz ""

          # Platform: macos-arm64
          bundle macos-arm64 \
            deepseek-macos-arm64 deepseek-tui-macos-arm64 tar.gz ""

          # Platform: windows-x64 (standard + portable)
          bundle windows-x64 \
            deepseek-windows-x64.exe deepseek-tui-windows-x64.exe zip ""
          bundle windows-x64 \
            deepseek-windows-x64.exe deepseek-tui-windows-x64.exe zip "portable"

          echo ""
          echo "=== Archive checksums ==="
          cat "$MANIFEST"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-bundles
          path: bundles/*
          if-no-files-found: error

  windows-installer:
    needs: [build, resolve]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'deepseek*-windows-x64.exe'
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Build NSIS installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.resolve.outputs.tag }}".TrimStart("v")
          Copy-Item "artifacts\deepseek-windows-x64.exe\deepseek-windows-x64.exe" "scripts\installer\deepseek.exe"
          Copy-Item "artifacts\deepseek-tui-windows-x64.exe\deepseek-tui-windows-x64.exe" "scripts\installer\deepseek-tui.exe"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) {
            $makensis = "${env:ProgramFiles}\NSIS\makensis.exe"
          }
          if (!(Test-Path $makensis)) {
            throw "makensis.exe not found after NSIS install"
          }
          Push-Location scripts\installer
          & $makensis "/DVERSION=$version" "deepseek.nsi"
          Pop-Location
          if (!(Test-Path "scripts\installer\DeepSeekSetup.exe")) {
            throw "DeepSeekSetup.exe was not produced"
          }
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekSetup.exe
          path: scripts/installer/DeepSeekSetup.exe
          if-no-files-found: error

  docker:
    needs: [build, resolve]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
          path: source
      - name: Checkout release infrastructure
        uses: actions/checkout@v4
        with:
          path: infra
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ needs.resolve.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern=v{{major}},value=${{ needs.resolve.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=v${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          # The build record is useful in CI, but it is uploaded as a
          # `.dockerbuild` artifact. The release job intentionally downloads
          # all binary artifacts, so suppress the extra record artifact there.
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          context: source
          file: infra/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DEEPSEEK_BUILD_SHA=${{ needs.resolve.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build, bundle, windows-installer, docker, resolve]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.bundle.result == 'success' && needs.windows-installer.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
      - name: Generate Windows npm launcher asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/deepseek-windows-launcher
          {
            printf '@echo off\r\n'
            printf 'where wt >nul 2>nul\r\n'
            printf 'set NO_ANIMATIONS=1\r\n'
            printf 'if "%%ERRORLEVEL%%"=="0" (\r\n'
            printf '    wt --title DeepSeek cmd /k "%%~dp0codewhale-windows-x64.exe"\r\n'
            printf ') else (\r\n'
            printf '    "%%~dp0codewhale-windows-x64.exe"\r\n'
            printf ')\r\n'
            printf '\r\n'
          } > artifacts/deepseek-windows-launcher/deepseek.bat
      - name: List artifacts
        run: find artifacts -type f
      - name: Generate checksum manifest
        shell: bash
        run: |
          mkdir -p artifacts/checksums
          # Canonical manifest used by deepseek's `deepseek update` flow.
          manifest="artifacts/checksums/deepseek-artifacts-sha256.txt"
          : > "${manifest}"
          while IFS= read -r -d '' file; do
            hash="$(sha256sum "${file}" | awk '{print $1}')"
            base="$(basename "${file}")"
            printf '%s  %s\n' "${hash}" "${base}" >> "${manifest}"
          done < <(find artifacts -type f ! -path 'artifacts/checksums/*' -print0 | sort -z)
          cat "${manifest}"
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: artifacts/*/*
          prerelease: false
          body: |
            > **DeepSeek** is the canonical project, command, npm package, and
            > release-asset name. The legacy npm package `deepseek-tui` is
            > deprecated and receives no further releases. Users coming from
            > v0.8.x legacy `deepseek` / `deepseek-tui` names should migrate
            > with `docs/REBRAND.md`.

            ## Install

            ### Recommended — npm (one command, both binaries)

            ```bash
            npm install -g @coohu/
            ```

            The wrapper downloads both binaries from this Release and places them in the same directory.

            ### Docker / GHCR

            ```bash
            docker run --rm -it \
              -e DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY" \
              -v ~/.deepseek:/home/deepseek/.deepseek \
              ghcr.io/coohu/:${{ needs.resolve.outputs.tag }}
            ```

            The image ships the `deepseek` dispatcher and `deepseek-tui` runtime. The `latest` tag is also updated on release.

            ### Cargo (Linux / macOS)

            ```bash
            cargo install deepseek-cli deepseek-tui --locked
            ```

            Both crates are required — `deepseek-cli` produces the `deepseek` dispatcher and `deepseek-tui` produces the interactive runtime that the dispatcher delegates to. Installing only one binary will fail at runtime with a `MISSING_COMPANION_BINARY` error.

            ### Manual download — platform archives (recommended)

            Each archive below contains **both** the `deepseek` dispatcher and `deepseek-tui` runtime, plus an install script:

            | Platform | Archive | Install script |
            |---|---|---|
            | Linux x64 | `deepseek-linux-x64.tar.gz` | `install.sh` |
            | Linux ARM64 | `deepseek-linux-arm64.tar.gz` | `install.sh` |
            | Linux RISC-V | `deepseek-linux-riscv64.tar.gz` | `install.sh` |
            | macOS x64 | `deepseek-macos-x64.tar.gz` | `install.sh` |
            | macOS ARM | `deepseek-macos-arm64.tar.gz` | `install.sh` |
            | Windows x64 (installer) | `DeepSeekSetup.exe` | NSIS setup |
            | Windows x64 | `deepseek-windows-x64.zip` | `install.bat` |
            | Windows x64 (portable) | `deepseek-windows-x64-portable.zip` | — |

            **Unix (Linux / macOS):**
            ```bash
            tar xzf deepseek-<platform>.tar.gz
            cd deepseek-<platform>
            ./install.sh
            ```

            **Windows:**
            - For the installer path, run `DeepSeekSetup.exe`; it installs both binaries under `%LOCALAPPDATA%\Programs\DeepSeek\bin` and adds that directory to the current-user PATH.
            - Extract `deepseek-windows-x64.zip`
            - Run `install.bat` (copies to `%USERPROFILE%\bin`)
            - Add `%USERPROFILE%\bin` to your PATH

            The **portable** Windows archive skips the install script — extract and run from any directory. The NSIS installer is currently unsigned and may trigger Windows SmartScreen until a signing certificate is wired into the release pipeline.

            Individual binaries are also attached below for scripting and the npm wrapper. The legacy npm package `deepseek-tui` is deprecated and is not republished. For migration from v0.8.x legacy binary names, see `docs/REBRAND.md`.

            ### Verify (recommended)

            Download the checksum manifests from this Release and verify:

            ```bash
            # Linux — archive bundles
            sha256sum -c deepseek-bundles-sha256.txt

            # Linux — individual binaries
            sha256sum -c deepseek-artifacts-sha256.txt

            # macOS
            shasum -a 256 -c deepseek-bundles-sha256.txt
            shasum -a 256 -c deepseek-artifacts-sha256.txt
            ```

            ## Contributors

            Thanks to @sximelon, @cyq1017, @Artenx, @LHqweasd, @wywsoor,
            @hsdbeebou, @mserrano11, @Dr3259, @yekern, @lioryx,
            @puneetdixit200, @HUQIANTAO, @xyuai, @gaord, @shenjackyuanjie,
            @AdityaVG13, @aboimpinto, @ousamabenyounes, @reidliu41,
            @ljm3790865, @idling11, @h3c-hexin, @AresNing, @tdccccc,
            @qiyuanlicn, @bevis-wong, @shuxiangxuebiancheng, @hongqitai,
            @NASLXTO, @wuxixing, @linzhiqin2003, @merchloubna70-dot,
            @mvanhorn, @Implementist, @jrcjrcc, @punkcanyang,
            @yusufgurdogan, @LeoAlex0, @mo-vic, @AiurArtanis, @nasus9527,
            and @lbcheng888 for reports, PRs, reviews, reproductions,
            design direction, and harvested work that shaped v0.9.0.

            ## Changelog

            See [CHANGELOG.md](https://github.com/coohu/DeepSeek-TUI/blob/main/CHANGELOG.md) for the full notes for this release.

  homebrew:
    needs: [release, resolve]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Homebrew tap token
        id: homebrew-token
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_PAT || secrets.RELEASE_TAG_PAT }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "No Homebrew tap token configured; skipping tap update."
            echo "available=false" >> "${GITHUB_OUTPUT}"
          else
            echo "available=true" >> "${GITHUB_OUTPUT}"
          fi
      # Checkout main (not the tag) so the release-infra script is always
      # available, even for tags created before this workflow was added.
      - uses: actions/checkout@v4
        if: steps.homebrew-token.outputs.available == 'true'
        with:
          ref: pub
      - name: Download checksum manifest
        if: steps.homebrew-token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.resolve.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern 'deepseek-artifacts-sha256.txt' \
            --dir /tmp
      - name: Update Homebrew tap
        if: steps.homebrew-token.outputs.available == 'true'
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
          MANIFEST: /tmp/deepseek-artifacts-sha256.txt
          TAP_REPO: coohu/deepseek-tui
          TOKEN: ${{ secrets.HOMEBREW_TAP_PAT || secrets.RELEASE_TAG_PAT }}
        run: bash .github/scripts/update-homebrew-tap.sh

